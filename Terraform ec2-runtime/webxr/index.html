<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WebXR Virtual Reality Runtime</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
}

#info{
position:absolute;
top:15px;
left:15px;
z-index:999;
background:rgba(0,0,0,.75);
color:white;
padding:15px;
border-radius:10px;
line-height:1.6;
font-size:15px;
max-width:320px;
}

h2{
margin:0 0 10px;
color:#00ffff;
}

</style>

</head>

<body>

<div id="info">

<h2>Cloud Runtime - WebXR Demo</h2>

<b>Hosted on:</b>

<ul>
<li>AWS EC2</li>
<li>Docker</li>
<li>Nginx</li>
<li>Terraform</li>
<li>WebXR (A-Frame)</li>
</ul>

Move:
W A S D

<br>

Look:
Mouse

<br><br>

If a VR headset is connected,
click the <b>Enter VR</b> button.

</div>

<a-scene
shadow="type:pcfsoft"
background="color:#87CEEB">

<!-- Sky -->

<a-sky color="#87CEEB"></a-sky>

<!-- Sun -->

<a-entity
light="type:directional;
intensity:1.3;
castShadow:true"
position="-3 8 2">
</a-entity>

<a-entity
light="type:ambient;
intensity:0.5">
</a-entity>

<!-- Ground -->

<a-plane
rotation="-90 0 0"
width="200"
height="200"
color="#3CB371">
</a-plane>

<!-- Camera -->

<a-entity
position="0 1.6 8">

<a-camera
wasd-controls
look-controls>

</a-camera>

</a-entity>

<!-- Road -->

<a-box
position="0 0.01 0"
depth="200"
width="8"
height="0.02"
color="#444">
</a-box>

<!-- Buildings -->

<a-box position="-8 3 -12" width="4" height="6" depth="4" color="#607D8B"></a-box>
<a-box position="8 4 -18" width="5" height="8" depth="5" color="#546E7A"></a-box>
<a-box position="-12 5 -28" width="6" height="10" depth="6" color="#455A64"></a-box>
<a-box position="12 6 -35" width="7" height="12" depth="7" color="#78909C"></a-box>
<a-box position="-18 4 -45" width="5" height="8" depth="5" color="#90A4AE"></a-box>
<a-box position="18 5 -52" width="6" height="10" depth="6" color="#607D8B"></a-box>

<!-- Trees -->

<a-cylinder position="-5 1 -8" radius="0.2" height="2" color="#795548"></a-cylinder>
<a-sphere position="-5 2.7 -8" radius="1" color="#2E7D32"></a-sphere>

<a-cylinder position="5 1 -8" radius="0.2" height="2" color="#795548"></a-cylinder>
<a-sphere position="5 2.7 -8" radius="1" color="#2E7D32"></a-sphere>

<a-cylinder position="-5 1 -20" radius="0.2" height="2" color="#795548"></a-cylinder>
<a-sphere position="-5 2.7 -20" radius="1" color="#2E7D32"></a-sphere>

<a-cylinder position="5 1 -20" radius="0.2" height="2" color="#795548"></a-cylinder>
<a-sphere position="5 2.7 -20" radius="1" color="#2E7D32"></a-sphere>

<a-cylinder position="-5 1 -32" radius="0.2" height="2" color="#795548"></a-cylinder>
<a-sphere position="-5 2.7 -32" radius="1" color="#2E7D32"></a-sphere>

<a-cylinder position="5 1 -32" radius="0.2" height="2" color="#795548"></a-cylinder>
<a-sphere position="5 2.7 -32" radius="1" color="#2E7D32"></a-sphere>

<!-- Floating Runtime Logos -->

<a-text
value="AWS"
position="-6 6 -10"
color="orange"
scale="4 4 4">
</a-text>

<a-text
value="Docker"
position="4 6 -18"
color="#0099ff"
scale="3 3 3">
</a-text>

<a-text
value="Terraform"
position="-6 7 -30"
color="#7B42BC"
scale="3 3 3">
</a-text>

<a-text
value="WebXR"
position="4 7 -45"
color="red"
scale="4 4 4">
</a-text>

<a-text
value="Cloud Runtime"
position="-10 10 -70"
color="#000"
scale="6 6 6">
</a-text>

<!-- Animated Cube -->

<a-box
position="0 2 -10"
rotation="0 45 0"
color="#00FFFF"
animation="property:rotation;
to:0 405 0;
loop:true;
dur:5000">
</a-box>

<!-- Floating Sphere -->

<a-sphere
position="4 3 -15"
radius="1"
color="#FFD700"
animation="property:position;
dir:alternate;
dur:2000;
loop:true;
to:4 5 -15">
</a-sphere>

</a-scene>

</body>
</html>
